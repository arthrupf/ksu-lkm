name: GKI Kernel Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      version_name:
        required: true
        type: string
      tag:
        required: true
        type: string
      ksu_branch:
        required: false
        type: string
        default: main
      build_lkm:
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      # =========================
      # SPACE
      # =========================
      - uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      # =========================
      # KernelSU
      # =========================
      - uses: actions/checkout@v4
        with:
          repository: luyanci/KernelSU
          ref: ${{ inputs.ksu_branch }}
          path: KernelSU

      # =========================
      # Dependencies
      # =========================
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y repo clang llvm ccache

      # =========================
      # Sync kernel
      # =========================
      - name: Sync kernel
        run: |
          set -e
          mkdir android-kernel
          cd android-kernel

          repo init --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b common-${{ inputs.tag }} \
            --repo-rev=v2.16

          repo sync -c -j$(nproc) --no-tags

      # =========================
      # KernelSU
      # =========================
      - name: Setup KernelSU
        working-directory: android-kernel
        run: |
          set -e

          ln -sf $GITHUB_WORKSPACE/KernelSU/kernel common/drivers/kernelsu

          echo -e "\nobj-\$(CONFIG_KSU) += kernelsu/" >> common/drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' common/drivers/Kconfig

      # =========================
      # BUILD (BAZEL ONLY)
      # =========================
      - name: Build Kernel
        working-directory: android-kernel
        run: |
          set -e

          tools/bazel run \
            --config=fast \
            --lto=thin \
            //common:kernel_aarch64_dist \
            -- --dist_dir=dist

      # =========================
      # OUTPUT
      # =========================
      - name: Prepare artifacts
        run: |
          set -e

          OUTDIR=android-kernel/dist
          mkdir -p output

          if [ "${{ inputs.build_lkm }}" = "true" ]; then
            if [ ! -f "$OUTDIR/kernelsu.ko" ]; then
              echo "kernelsu.ko not found!"
              exit 1
            fi

            LLVM_STRIP=$(which llvm-strip || true)

            if [ -n "$LLVM_STRIP" ]; then
              $LLVM_STRIP --strip-unneeded $OUTDIR/kernelsu.ko
            else
              strip --strip-unneeded $OUTDIR/kernelsu.ko || true
            fi

            mv $OUTDIR/kernelsu.ko ./output/${{ inputs.version }}_kernelsu.ko
          else
            cp $OUTDIR/Image ./output/ || true
            cp $OUTDIR/Image.lz4 ./output/ || true
          fi

      # =========================
      # Upload
      # =========================
      - name: Upload LKM
        if: ${{ inputs.build_lkm == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.version }}-lkm
          path: ./output/*.ko

      - name: Upload Kernel
        if: ${{ inputs.build_lkm == false }}
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ inputs.version_name }}
          path: ./output/*
