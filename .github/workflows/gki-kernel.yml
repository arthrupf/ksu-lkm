name: GKI Kernel KVM AArch64 Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Build version"
        required: true
        default: "test"
      version_name:
        description: "Version name"
        required: true
        default: "android15-kvm"
      tag:
        description: "Kernel tag (example: android15-6.6)"
        required: true
        default: "android15-6.6"
      ksu_branch:
        description: "KernelSU branch"
        required: false
        default: "main"
      build_lkm:
        description: "Build KernelSU LKM"
        required: false
        default: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      # =========================
      # SPACE OPTIMIZATION
      # =========================
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      # =========================
      # KERNELSU
      # =========================
      - name: Checkout KernelSU
        uses: actions/checkout@v4
        with:
          repository: luyanci/KernelSU
          ref: ${{ inputs.ksu_branch }}
          path: KernelSU

      # =========================
      # DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y repo clang llvm ccache flex bison bc libssl-dev

      # =========================
      # SYNC KERNEL
      # =========================
      - name: Sync kernel source
        run: |
          set -e
          mkdir android-kernel
          cd android-kernel

          repo init --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b common-${{ inputs.tag }} \
            --repo-rev=v2.16

          repo sync -c -j$(nproc) --no-tags

      # =========================
      # ENABLE KVM (AARCH64)
      # =========================
      - name: Enable KVM AArch64
        working-directory: android-kernel
        run: |
          set -e

          CONFIG=common/build.config.gki.aarch64

          echo "CONFIG_VIRTUALIZATION=y" >> $CONFIG
          echo "CONFIG_KVM=y" >> $CONFIG
          echo "CONFIG_KVM_ARM_HOST=y" >> $CONFIG
          echo "CONFIG_KVM_ARM_VGIC_V3=y" >> $CONFIG
          echo "CONFIG_KVM_ARM_TIMER=y" >> $CONFIG

      # =========================
      # KERNELSU INTEGRATION
      # =========================
      - name: Setup KernelSU
        working-directory: android-kernel
        run: |
          set -e

          ln -sf $GITHUB_WORKSPACE/KernelSU/kernel common/drivers/kernelsu

          echo -e "\nobj-\$(CONFIG_KSU) += kernelsu/" >> common/drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' common/drivers/Kconfig

      # =========================
      # BUILD (BAZEL - GKI STANDARD)
      # =========================
      - name: Build Kernel
        working-directory: android-kernel
        run: |
          set -e

          tools/bazel run \
            --config=fast \
            --lto=thin \
            //common:kernel_aarch64_dist \
            -- --dist_dir=dist

      # =========================
      # ARTIFACT PREPARATION
      # =========================
      - name: Prepare artifacts
        run: |
          set -e

          OUTDIR=$(find android-kernel -type d -name dist | head -n 1)

          echo "Output: $OUTDIR"

          mkdir -p output

          if [ "${{ inputs.build_lkm }}" = "true" ]; then

            if [ ! -f "$OUTDIR/kernelsu.ko" ]; then
              echo "kernelsu.ko not found!"
              exit 1
            fi

            LLVM_STRIP=$(which llvm-strip || true)

            if [ -n "$LLVM_STRIP" ]; then
              $LLVM_STRIP --strip-unneeded $OUTDIR/kernelsu.ko
            else
              strip --strip-unneeded $OUTDIR/kernelsu.ko || true
            fi

            mv $OUTDIR/kernelsu.ko ./output/${{ inputs.version }}_kernelsu.ko

          else
            cp $OUTDIR/Image ./output/ || true
            cp $OUTDIR/Image.lz4 ./output/ || true
          fi

      # =========================
      # UPLOAD
      # =========================
      - name: Upload KernelSU LKM
        if: ${{ inputs.build_lkm == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.version }}-kvm-lkm
          path: ./output/*.ko

      - name: Upload Kernel Image
        if: ${{ inputs.build_lkm == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ inputs.version_name }}
          path: ./output/*
