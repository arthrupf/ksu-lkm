name: GKI Kernel Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      version_name:
        required: true
        type: string
      tag:
        required: true
        type: string
      os_patch_level:
        required: false
        type: string
        default: 2022-05
      ksu_branch:
        required: false
        type: string
        default: main
      build_lkm:
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build ${{ inputs.version_name }}
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      # =========================
      # SPACE
      # =========================
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      # =========================
      # KERNELSU
      # =========================
      - name: Checkout KernelSU
        uses: actions/checkout@v4
        with:
          repository: luyanci/KernelSU
          ref: ${{ inputs.ksu_branch }}
          path: KernelSU
          fetch-depth: 0

      # =========================
      # DEPS
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y repo clang llvm ccache flex bison bc libssl-dev

      # =========================
      # SYNC KERNEL
      # =========================
      - name: Setup kernel source
        run: |
          set -e
          mkdir android-kernel
          cd android-kernel

          repo init --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b common-${{ inputs.tag }} \
            --repo-rev=v2.16

          repo sync -c -j$(nproc --all) --no-tags

      # =========================
      # OPTIONAL CONFIGS
      # =========================
      - name: Enable KVM
        working-directory: android-kernel
        run: |
          echo "CONFIG_VIRTUALIZATION=y" >> common/build.config.gki.aarch64
          echo "CONFIG_KVM=y" >> common/build.config.gki.aarch64
          echo "CONFIG_KVM_ARM_HOST=y" >> common/build.config.gki.aarch64

      # =========================
      # KERNELSU INTEGRATION
      # =========================
      - name: Setup KernelSU
        working-directory: android-kernel
        run: |
          set -e

          ln -sf $GITHUB_WORKSPACE/KernelSU/kernel \
            common/drivers/kernelsu

          echo -e "\nobj-\$(CONFIG_KSU) += kernelsu/" >> common/drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' common/drivers/Kconfig

      # =========================
      # BUILD (FORCED build.sh)
      # =========================
      - name: Build Kernel / LKM
        working-directory: android-kernel
        run: |
          set -e

          # Force classic AOSP build (avoids Bazel ABI issues)
          LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 \
          build/build.sh CC="ccache clang"

      # =========================
      # PREPARE OUTPUT
      # =========================
      - name: Prepare artifacts
        run: |
          set -e

          # Detect output directory automatically
          OUTDIR=$(find android-kernel -type d -path "*dist" | head -n 1)

          echo "Using OUTDIR=$OUTDIR"

          mkdir -p output

          if [ "${{ inputs.build_lkm }}" = "true" ]; then

            if [ ! -f "$OUTDIR/kernelsu.ko" ]; then
              echo "kernelsu.ko not found!"
              exit 1
            fi

            LLVM_STRIP=$(which llvm-strip || true)

            if [ -n "$LLVM_STRIP" ]; then
              $LLVM_STRIP --strip-unneeded $OUTDIR/kernelsu.ko
            else
              strip --strip-unneeded $OUTDIR/kernelsu.ko || true
            fi

            mv $OUTDIR/kernelsu.ko ./output/${{ inputs.version }}_kernelsu.ko

          else
            cp $OUTDIR/Image ./output/ || true
            cp $OUTDIR/Image.lz4 ./output/ || true
          fi

      # =========================
      # UPLOAD
      # =========================
      - name: Upload LKM
        if: ${{ inputs.build_lkm == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.version }}-lkm
          path: ./output/*.ko

      - name: Upload Kernel Image
        if: ${{ inputs.build_lkm == false }}
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ inputs.version_name }}
          path: ./output/*
