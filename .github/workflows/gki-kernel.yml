name: GKI Kernel KVM AArch64 Build (No LKM)

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        default: "test"
        type: string
      version_name:
        required: true
        default: "android15-kvm"
        type: string
      tag:
        required: true
        default: "android15-6.6"
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:

      # =========================
      # SPACE OPTIMIZATION
      # =========================
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      # =========================
      # DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            repo clang llvm ccache \
            make gcc g++ flex bison \
            python3 libelf-dev bc \
            libssl-dev

      # =========================
      # SYNC KERNEL
      # =========================
      - name: Sync kernel source
        run: |
          set -e
          mkdir android-kernel
          cd android-kernel

          repo init --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b common-${{ inputs.tag }} \
            --repo-rev=v2.16

          repo sync -c -j$(nproc) --no-tags

      # =========================
      # FIX KERNEL SCRIPTS
      # =========================
      - name: Fix kernel scripts permissions
        working-directory: android-kernel
        run: |
          set -e
          chmod +x -R common/scripts || true
          chmod +x -R common/tools || true

      # =========================
      # ENABLE KVM (ANDROID 15 AARCH64)
      # =========================
      - name: Enable KVM
        working-directory: android-kernel
        run: |
          set -e

          CFG=common/build.config.gki.aarch64

          echo "CONFIG_VIRTUALIZATION=y" >> $CFG
          echo "CONFIG_KVM=y" >> $CFG
          echo "CONFIG_KVM_ARM_HOST=y" >> $CFG
          echo "CONFIG_KVM_ARM_VGIC_V3=y" >> $CFG
          echo "CONFIG_KVM_ARM_TIMER=y" >> $CFG

      # =========================
      # BUILD (BAZEL ONLY)
      # =========================
      - name: Build Kernel
        working-directory: android-kernel
        run: |
          set -e

          tools/bazel run \
            --config=fast \
            --lto=thin \
            //common:kernel_aarch64_dist \
            -- --dist_dir=dist

      # =========================
      # OUTPUT
      # =========================
      - name: Prepare artifacts
        run: |
          set -e

          OUTDIR=$(find android-kernel -type d -name dist | head -n 1)

          echo "Using OUTDIR=$OUTDIR"

          mkdir -p output

          # kernel image only (NO LKM / NO KERNELSU)
          if [ -f "$OUTDIR/Image" ]; then
            cp "$OUTDIR/Image" ./output/
          fi

          if [ -f "$OUTDIR/Image.lz4" ]; then
            cp "$OUTDIR/Image.lz4" ./output/
          fi

      # =========================
      # UPLOAD
      # =========================
      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ inputs.version_name }}
          path: ./output/*
