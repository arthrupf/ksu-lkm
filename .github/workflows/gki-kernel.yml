name: GKI Kernel Build

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      version_name:
        required: true
        type: string
      tag:
        required: true
        type: string
      os_patch_level:
        required: false
        type: string
        default: 2022-05
      patch_path:
        required: false
        type: string
      use_cache:
        required: false
        type: boolean
        default: true
      debug:
        required: false
        type: boolean
        default: false
      ksu_branch:
        required: false
        type: string
        default: main
      build_lkm:
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build ${{ inputs.version_name }}
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - uses: actions/checkout@v4
        with:
          repository: luyanci/KernelSU
          ref: ${{ inputs.ksu_branch }}
          path: KernelSU
          fetch-depth: 0

      - name: Install dependencies (LLVM fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y repo clang llvm

      - name: Setup kernel source
        run: |
          set -e
          mkdir android-kernel && cd android-kernel
          repo init --depth=1 --u https://android.googlesource.com/kernel/manifest -b common-${{ inputs.tag }} --repo-rev=v2.16
          repo sync -c -j$(nproc --all) --no-tags

      # =========================
      # KVM HOST SUPPORT
      # =========================
      - name: Enable KVM Host Support
        working-directory: android-kernel
        run: |
          echo "CONFIG_VIRTUALIZATION=y" >> common/build.config.gki.aarch64
          echo "CONFIG_KVM=y" >> common/build.config.gki.aarch64
          echo "CONFIG_KVM_ARM_HOST=y" >> common/build.config.gki.aarch64

      - name: Setup KernelSU
        working-directory: android-kernel
        run: |
          set -e
          GKI_ROOT=$(pwd)

          ln -sf $GITHUB_WORKSPACE/KernelSU/kernel $GKI_ROOT/common/drivers/kernelsu

          echo -e "\nobj-\$(CONFIG_KSU) += kernelsu/" >> common/drivers/Makefile
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' common/drivers/Kconfig

      # =========================
      # CLEAN PROTECTED EXPORTS (YOUR REQUEST)
      # =========================
      - name: Clean protected exports
        working-directory: android-kernel
        run: |
          set -e
          rm -f common/android/abi_gki_protected_exports_* || true
          echo "[+] Protected exports cleaned"

      - name: Build Kernel/LKM
        working-directory: android-kernel
        run: |
          set -e

          if [ -e build/build.sh ]; then
            LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 \
            build/build.sh CC="ccache clang"
          else
            tools/bazel run --config=fast --lto=thin \
              //common:kernel_aarch64_dist -- --dist_dir=dist
          fi

      # =========================
      # FIXED ARTIFACT STEP (NO llvm-strip-15)
      # =========================
      - name: Prepare artifacts
        run: |
          set -e

          OUTDIR=android-kernel/out/${{ inputs.version }}/dist
          mkdir -p output

          if [ "${{ inputs.build_lkm }}" = "true" ]; then

            LLVM_STRIP=$(which llvm-strip || true)

            if [ -z "$LLVM_STRIP" ]; then
              echo "llvm-strip not found, using strip fallback"
              strip --strip-unneeded $OUTDIR/kernelsu.ko
            else
              $LLVM_STRIP --strip-unneeded $OUTDIR/kernelsu.ko
            fi

            mv $OUTDIR/kernelsu.ko ./output/${{ inputs.version }}_kernelsu.ko

          else
            cp $OUTDIR/Image ./output/ || true
            cp $OUTDIR/Image.lz4 ./output/ || true
          fi

      - name: Upload LKM
        if: ${{ inputs.build_lkm == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.version }}-lkm
          path: ./output/*.ko

      - name: Upload Kernel Image
        if: ${{ inputs.build_lkm == false }}
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ inputs.version_name }}
          path: ./output/*
