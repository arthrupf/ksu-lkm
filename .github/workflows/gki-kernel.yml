name: GKI Kernel Build (KVM)

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      version_name:
        required: true
        type: string
      tag:
        required: true
        type: string
      os_patch_level:
        required: false
        type: string
        default: 2022-05
      patch_path:
        required: false
        type: string
      use_cache:
        required: false
        type: boolean
        default: true
      debug:
        required: false
        type: boolean
        default: false
      ksu_branch:
        required: false
        type: string
        default: 'main'
      build_lkm:
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build KVM ${{ inputs.version_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master

      - uses: actions/checkout@v4
        with:
          repository: luyanci/KernelSU
          ref: ${{ inputs.ksu_branch }}
          path: KernelSU

      - name: Setup kernel source
        run: |
          sudo apt-get install repo -y
          mkdir android-kernel && cd android-kernel
          repo init --depth=1 --u https://android.googlesource.com/kernel/manifest -b common-${{ inputs.tag }} --repo-rev=v2.16
          repo sync -c -j$(nproc --all) --no-tags

      - name: Setup KernelSU
        run: |
          cd android-kernel
          ln -sf $GITHUB_WORKSPACE/KernelSU/kernel common/drivers/kernelsu
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> common/drivers/Makefile

      # ✅ KVM ENABLE STEP (important)
      - name: Enable KVM (Bazel compatible)
        working-directory: android-kernel
        run: |
          echo "[+] Enabling KVM..."

          COMMON=common/arch/arm64/configs

          if [ -f "$COMMON/gki_defconfig" ]; then
            DEFCONFIG="$COMMON/gki_defconfig"
          else
            DEFCONFIG=$(find common -name "gki_defconfig" | head -n 1)
          fi

          echo "Using defconfig: $DEFCONFIG"

          cat <<EOF >> $DEFCONFIG
CONFIG_KVM=y
CONFIG_KVM_ARM_HOST=y
CONFIG_KVM_ARM_VGIC=y
CONFIG_KVM_ARM_TIMER=y
EOF

          sort -u -o $DEFCONFIG $DEFCONFIG

          echo "[+] KVM enabled"

      - name: Setup ccache
        if: inputs.use_cache == true
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: gki-kernel-${{ inputs.version_name }}

      - name: Setup for LKM
        if: inputs.build_lkm == true
        working-directory: android-kernel
        run: |
          sudo apt-get install llvm-15 -y
          sed -i '/config KSU/,/help/{s/default y/default m/}' common/drivers/kernelsu/Kconfig

      - name: Build Kernel (Bazel/GKI)
        working-directory: android-kernel
        run: |
          if [ -e build/build.sh ]; then
            LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh
          else
            tools/bazel run --config=fast --lto=thin //common:kernel_aarch64_dist -- --dist_dir=dist
          fi

      - name: Prepare artifacts
        run: |
          mkdir output
          cp android-kernel/dist/* output/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KVM-${{ inputs.version_name }}
          path: output/*
